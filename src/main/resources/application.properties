# =========================
# SERVER
# =========================
server.port=8080

# =========================
# MONGODB
# =========================
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/workflow_platform}
spring.data.mongodb.database=workflow_platform

# =========================
# JWT CONFIG
# =========================
jwt.secret=${JWT_SECRET:workflow_platform_secret_key_2026_must_be_at_least_32_chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# JACKSON
# =========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# =========================
# OPENAI / LANGCHAIN4J
# =========================
openai.api.key=${OPENAI_API_KEY:dummy-key}
openai.model=gpt-4o-mini
openai.temperature=0.0
openai.timeout-seconds=30

# =========================
# EMAIL
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tucorreo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tupassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# =========================
# SPRING CORE
# =========================
spring.main.allow-bean-definition-overriding=true
